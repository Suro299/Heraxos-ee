        </sectoin>


        <!-- APPSTORE SCREEN -->

        <section id="app_stor_app_screen" class="app_stor_app_screen">
            <div class="calcul_app_div_app">
                <img src="./img/app_icon/app_store_app_icon/Calculyator/Calculyator_app_icon.png" alt="">
